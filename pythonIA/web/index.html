<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MonitorIA</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#252833;
  --border:#2e3245;--text:#e2e8f0;--text2:#94a3b8;
  --accent:#60a5fa;--accent2:#818cf8;--green:#4ade80;
  --yellow:#fbbf24;--red:#f87171;
  --radius:10px;--shadow:0 4px 24px rgba(0,0,0,.4);
}
html{font-size:15px}
body{
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;line-height:1.6;
}
a{color:var(--accent);text-decoration:none}

header{
  position:sticky;top:0;z-index:10;
  background:linear-gradient(180deg,var(--bg) 60%,transparent);
  padding:1.2rem 1.5rem .8rem;
  display:flex;align-items:center;gap:1rem;flex-wrap:wrap;
}
header h1{
  font-size:1.4rem;font-weight:700;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
#status{
  font-size:.8rem;color:var(--text2);
  display:flex;align-items:center;gap:.4rem;
}
#status .dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--green);
  animation:pulse 2s infinite;
}
#status.disconnected .dot{background:var(--red);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.counter{
  margin-left:auto;font-size:.85rem;color:var(--text2);
  font-variant-numeric:tabular-nums;
}

main{padding:.5rem 1.5rem 3rem;display:flex;flex-direction:column;gap:1rem}

.empty-state{
  text-align:center;padding:4rem 1rem;color:var(--text2);
}
.empty-state h2{font-size:1.1rem;margin-bottom:.4rem;color:var(--text)}
.empty-state p{font-size:.85rem}

.capture-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;
  box-shadow:var(--shadow);
  animation:slideIn .3s ease;
}
@keyframes slideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

.capture-header{
  padding:.7rem 1rem;display:flex;align-items:center;gap:.8rem;
  border-bottom:1px solid var(--border);
  cursor:pointer;user-select:none;
}
.capture-header:hover{background:var(--surface2)}
.capture-header .badge{
  font-size:.7rem;font-weight:600;
  padding:.15rem .5rem;border-radius:20px;
  background:var(--accent);color:var(--bg);white-space:nowrap;
}
.capture-header .ts{font-size:.78rem;color:var(--text2);font-variant-numeric:tabular-nums}
.capture-header .arrow{
  margin-left:auto;font-size:.7rem;color:var(--text2);
  transition:transform .2s;
}
.capture-card.open .capture-header .arrow{transform:rotate(90deg)}

.capture-body{display:none;padding:.8rem 1rem}
.capture-card.open .capture-body{display:block}

.q-block{margin-bottom:1rem}
.q-block:last-child{margin-bottom:0}
.q-label{
  font-size:.72rem;font-weight:600;text-transform:uppercase;
  color:var(--accent2);letter-spacing:.05em;margin-bottom:.25rem;
}
.q-text{font-size:.92rem;margin-bottom:.4rem;color:var(--text)}
.q-incomplete{
  font-size:.72rem;color:var(--yellow);font-style:italic;margin-bottom:.2rem;
}

.opt-list{list-style:none;padding-left:.6rem;display:flex;flex-direction:column;gap:.2rem}
.opt-list li{
  font-size:.85rem;color:var(--text2);padding:.25rem .5rem;
  border-left:2px solid var(--border);
  transition:border-color .15s;
}
.opt-list li:hover{border-color:var(--accent);color:var(--text)}

.ocr-preview{
  margin-top:.8rem;padding:.6rem;
  background:var(--bg);border-radius:6px;
  font-family:'Consolas','Fira Code',monospace;font-size:.75rem;
  color:var(--text2);white-space:pre-wrap;word-break:break-word;
  max-height:200px;overflow-y:auto;
  border:1px solid var(--border);
}
.ocr-toggle{
  font-size:.75rem;color:var(--accent);cursor:pointer;
  margin-top:.4rem;display:inline-block;
}
.ocr-toggle:hover{text-decoration:underline}
</style>
</head>
<body>
<header>
  <h1>MonitorIA</h1>
  <div id="status"><span class="dot"></span><span id="statusText">Conectando...</span></div>
  <div class="counter" id="counter"></div>
</header>
<main id="captures">
  <div class="empty-state" id="emptyState">
    <h2>Nenhuma captura ainda</h2>
    <p>Use Ctrl+Shift+S (tela) ou Ctrl+Shift+W (janela) no app para capturar.</p>
  </div>
</main>
<script>
(function(){
  const API = window.location.origin;
  const main = document.getElementById('captures');
  const statusEl = document.getElementById('status');
  const statusText = document.getElementById('statusText');
  const counterEl = document.getElementById('counter');
  const emptyState = document.getElementById('emptyState');

  let knownVersion = 0;
  let captureCards = {};
  let pollInterval = 800;
  let failCount = 0;

  function escHtml(s){
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function renderCapture(entry){
    const id = entry.id;
    const ts = entry.timestamp;
    const data = entry.data || {};
    const items = data.items || [];
    const total = data.total_questions || items.length;
    const preview = data.filtered_text_preview || '';
    const backend = data.backend || '';
    const incomplete = data.incomplete_questions || 0;
    const timings = data.timings_ms || {};
    const parsed = data.parsed_json || null;

    if(captureCards[id]) return;

    emptyState.style.display = 'none';

    const card = document.createElement('div');
    card.className = 'capture-card open';
    card.dataset.id = id;

    let headerHtml = `<div class="capture-header">
      <span class="badge">#${id}</span>
      <span class="badge" style="background:var(--green)">${total} pergunta${total!==1?'s':''}</span>
      ${incomplete>0 ? `<span class="badge" style="background:var(--yellow);color:var(--bg)">${incomplete} incompleta${incomplete!==1?'s':''}</span>` : ``}
      ${backend ? `<span class="badge" style="background:var(--accent2)">${escHtml(backend)}</span>` : ``}
      <span class="ts">${ts}</span>
      <span class="arrow">&#9654;</span>
    </div>`;

    let bodyHtml = '<div class="capture-body">';
    const tOcr = timings.ocr_parse || 0;
    const tLlm = timings.llm || 0;
    if(tOcr || tLlm){
      bodyHtml += `<div style="color:var(--text2);font-size:.8rem;margin-bottom:.6rem">
        Tempo: OCR+parse ${tOcr}ms${tLlm?`, LLM ${tLlm}ms`:``}
      </div>`;
    }
    if(items.length === 0){
      bodyHtml += '<p style="color:var(--text2);font-size:.85rem">Nenhuma pergunta detectada nesta captura.</p>';
    } else {
      items.forEach(function(item, idx){
        const q = item.question || item.question_short || '(sem texto)';
        const opts = item.options || [];
        const complete = item.complete !== false;
        bodyHtml += `<div class="q-block">`;
        bodyHtml += `<div class="q-label">Pergunta ${idx+1}</div>`;
        bodyHtml += `<div class="q-text">${escHtml(q)}</div>`;
        if(!complete){
          bodyHtml += `<div class="q-incomplete">Deteccao incompleta (< 2 opcoes)</div>`;
        }
        if(opts.length > 0){
          bodyHtml += '<ul class="opt-list">';
          opts.forEach(function(o, oi){
            const letter = String.fromCharCode(65 + oi);
            bodyHtml += `<li><strong>${letter})</strong> ${escHtml(o)}</li>`;
          });
          bodyHtml += '</ul>';
        }
        bodyHtml += '</div>';
      });
    }

    if(preview){
      const previewId = 'ocr-prev-' + id;
      bodyHtml += `<div class="ocr-toggle" onclick="var e=document.getElementById('${previewId}');e.style.display=e.style.display==='none'?'block':'none'">
        Mostrar/ocultar OCR filtrado
      </div>`;
      bodyHtml += `<div class="ocr-preview" id="${previewId}" style="display:none">${escHtml(preview)}</div>`;
    }

    if(parsed){
      const jsonId = 'json-prev-' + id;
      let pretty = '';
      try { pretty = JSON.stringify(parsed, null, 2); } catch(e) { pretty = String(parsed); }
      bodyHtml += `<div class="ocr-toggle" onclick="var e=document.getElementById('${jsonId}');e.style.display=e.style.display==='none'?'block':'none'">
        Mostrar/ocultar JSON (AirLLM)
      </div>`;
      bodyHtml += `<div class="ocr-preview" id="${jsonId}" style="display:none">${escHtml(pretty)}</div>`;
    }
    bodyHtml += '</div>';

    card.innerHTML = headerHtml + bodyHtml;

    card.querySelector('.capture-header').addEventListener('click', function(){
      card.classList.toggle('open');
    });

    if(main.firstChild && main.firstChild !== emptyState){
      main.insertBefore(card, main.firstChild);
    } else {
      main.appendChild(card);
    }
    captureCards[id] = true;
  }

  function setConnected(ok){
    if(ok){
      statusEl.className = '';
      statusText.textContent = 'Conectado';
      failCount = 0;
      pollInterval = 800;
    } else {
      statusEl.className = 'disconnected';
      statusText.textContent = 'Sem conexao';
      failCount++;
      pollInterval = Math.min(5000, 800 + failCount * 500);
    }
  }

  async function poll(){
    try {
      const vRes = await fetch(API + '/api/version');
      if(!vRes.ok) throw new Error('version');
      const vData = await vRes.json();
      const serverVersion = vData.version || 0;
      setConnected(true);

      if(serverVersion > knownVersion){
        const hRes = await fetch(API + '/api/history');
        if(!hRes.ok) throw new Error('history');
        const history = await hRes.json();
        if(Array.isArray(history)){
          history.forEach(renderCapture);
        }
        knownVersion = serverVersion;
        counterEl.textContent = `${serverVersion} captura${serverVersion!==1?'s':''}`;
      }
    } catch(e) {
      setConnected(false);
    }
    setTimeout(poll, pollInterval);
  }

  poll();
})();
</script>
</body>
</html>
